context:
    version: 0.1.3
package:
    name: motion_tools
    version: ${{version}}

source:
    git: https://github.com/nmarticorena/motion_tools.git
    tag: 0.1.3
build:
    noarch: python
    script: pip install . -v


requirements:
    host:
        - python
        - pip
        - hatchling
        - tyro
        - numpy
    run:
        - python
        - tyro
        - numpy
        - rerun-sdk<0.30


tests:
    - script:
        - load-pkl --help
