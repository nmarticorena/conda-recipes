context:
    version: 1.0.1
package:
    name: unitree_sdk2py
    version: ${{version}}
source:
  - git: https://github.com/nmarticorena/unitree_sdk2_python.git
    rev: f7a1961b25d404dcd76956619563ca40a4ab2ea9




build:
  skip:
    - win
    - osx
  number: 8
  script:
      - pip install . -v

requirements:
  host:
    - python
    - pip
    # - py-opencv # we dont need this only for the quadrupeds
    - numpy
    - cyclonedds ==0.10.2
  run:
    - python
    - cyclonedds ==0.10.2
    - numpy

# tests:
#   - package_contents:
#       files:
#           - utils/lib/crc_amd64.so # Not working but is actually added

extra:
  recipe-maintainers:
    - nmarticorena
