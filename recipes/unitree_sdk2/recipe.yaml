package:
  name: unitree_sdk2
  version: "2.0.2"



source:
  - url: https://github.com/unitreerobotics/unitree_sdk2/archive/f29ee9f234851e9e79f75102c0f9e83008d8fdd1.zip
    sha256: fefca2c2bddbfb188ecf5fcc63a5189ff217e3f01425b3a02135faaf8e59e932
    patches:
      add-print.patch




build:
  skip:
    - win
    - osx
  number: 0

requirements:
  build:
    - ${{ compiler('cxx') }}
    # - ${{ stdlib('c') }}
    - sysroot_linux-64 2.28.*
    - cmake
    - ninja
  host:
    - eigen
    - boost
    - yaml-cpp
    - boost
    - spdlog
    - fmt
    - cyclonedds ==0.10.2
  run_exports:
    - ${{ pin_subpackage('unitree_sdk2', upper_bound='x.x.x') }}




extra:
  recipe-maintainers:
    - nmarticorena
